<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideCo Admin — Sign In</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layouts.css">
</head>
<body class="light">

  <header class="light-header">
    <a href="../../index.html" class="logo-light">
      <em>Ride</em>Co <span class="admin-tag">ADMIN</span>
    </a>
    <nav class="light-nav">
      <a href="../../index.html">← Back to Site</a>
    </nav>
  </header>

  <div class="auth-body" style="background:var(--lp-bg)">
    <div class="light-card" style="max-width:420px;width:100%;padding:40px;border-radius:var(--radius-lg)">

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <div style="background:var(--lp-primary);width:44px;height:44px;border-radius:var(--radius-sm);
                    display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">
          🛡
        </div>
        <div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--lp-text)">
            Admin Portal
          </div>
          <div style="font-size:12px;color:var(--lp-sub)">RideCo Management System</div>
        </div>
      </div>

      <div class="form-group">
        <label class="light-label">Admin Email</label>
        <input id="admin-email" class="light-input" type="email" placeholder="admin@rideco.com">
      </div>
      <div class="form-group">
        <label class="light-label">Password</label>
        <input id="admin-password" class="light-input" type="password" placeholder="Enter admin password">
      </div>
      <div class="form-group">
        <label class="light-label">Two-Factor Code</label>
        <input id="admin-2fa" class="light-input" type="text" placeholder="6-digit code"
               style="letter-spacing:4px;text-align:center;font-size:18px">
      </div>

      <button id="admin-login-btn" class="btn btn-primary-light btn-block btn-lg" style="margin-top:8px">
        Sign In to Admin →
      </button>

      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--lp-sub)">
        🔒 Authorized personnel only
      </div>

    </div>
  </div>

  <script src="../../js/nav.js"></script>
  <script src="../../js/api.js"></script>
  <script>
    document.getElementById('admin-login-btn').addEventListener('click', function() {
      const email = document.getElementById('admin-email').value.trim();
      const pass  = document.getElementById('admin-password').value;
      const twofa = document.getElementById('admin-2fa').value.trim();
      if (!email || !pass || !twofa) { alert('Please fill in all fields'); return; }
      // PROTOTYPING:
      window.location.href = 'dashboard.html';
      // BACKEND READY: loginAdmin(email, pass, twofa);
    });
  </script>

</body>
</html>
