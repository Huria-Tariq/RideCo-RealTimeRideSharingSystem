<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideCo — Sign In</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layouts.css">
</head>
<body class="dark">

  <header class="dark-header">
    <a href="../../index.html" class="logo"><em>Ride</em>Co</a>
    <nav class="dark-nav">
      <a href="../../index.html">← Home</a>
      <div style="width:1px;height:20px;background:var(--dp-border);margin:0 4px"></div>
      <a href="../driver/login.html" style="color:var(--dp-success)">🚗 Driver Login</a>
      <a href="register.html" class="btn btn-outline-dark btn-sm" style="padding:7px 16px">Register</a>
    </nav>
  </header>

  <div class="auth-body">
    <div class="auth-card">

      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your passenger account</div>

      <div class="form-group">
        <label class="dark-label">Email or Phone</label>
        <input id="login-email" class="dark-input" type="text"
               placeholder="you@example.com or +1 234 567 8900">
      </div>
      <div class="form-group">
        <label class="dark-label">Password</label>
        <input id="login-password" class="dark-input" type="password"
               placeholder="Enter your password">
      </div>
      <div class="flex justify-between items-center mb-20" style="font-size:13px">
        <label style="display:flex;align-items:center;gap:8px;color:var(--dp-sub);cursor:pointer">
          <input type="checkbox" style="accent-color:var(--dp-accent)"> Remember me
        </label>
        <span style="color:var(--dp-accent);cursor:pointer;font-size:13px">Forgot password?</span>
      </div>

      <button id="login-btn" class="btn btn-white btn-block btn-lg">Sign In →</button>

      <div class="auth-or">OR</div>

      <button class="btn btn-outline-dark btn-block" style="margin-bottom:8px"
              onclick="goTo('dashboard.html')">
        <span>🌐</span> Continue with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

    </div>
  </div>

  <script src="../../js/nav.js"></script>
  <script src="../../js/data.js"></script>
  <script src="../../js/ui.js"></script>
  <script>
    document.getElementById('login-btn').addEventListener('click', function() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { alert('Please fill in all fields'); return; }
      // PROTOTYPING:
      window.location.href = 'dashboard.html';
      // BACKEND READY: loginPassenger(email, password);
    });
  </script>

</body>
</html>
